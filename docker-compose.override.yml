services:
  proxy:
    ports:
      - "8040:80"
      - "8094:8080"
  db:
    ports:
      - "5436:5432"
  backend:
    volumes:
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
      - agent-artifacts:/data/agent_artifacts
    environment:
      - POSTGRES_PORT=5432
  orchestrator:
    volumes:
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
      - agent-artifacts:/data/agent_artifacts
    environment:
      - POSTGRES_PORT=5432
  celery_worker:
    environment:
      - POSTGRES_PORT=5432
  prestart:
    environment:
      - POSTGRES_PORT=5432
