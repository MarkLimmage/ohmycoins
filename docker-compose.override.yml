# Sprint 2.41 Track A — Port isolation override
# Proxy and DB host ports controlled via .env (PROXY_PORT=8010, POSTGRES_PORT=5433)
# Redis has no base port mapping so added here
# Backend services override POSTGRES_PORT=5432 for internal container connections
services:
  redis:
    ports:
      - "6380:6379"
  orchestrator:
    environment:
      - RUN_COLLECTORS=${RUN_COLLECTORS:-False}
      - POSTGRES_PORT=5432
  prestart:
    environment:
      - POSTGRES_PORT=5432
  backend:
    environment:
      - POSTGRES_PORT=5432
  celery_worker:
    environment:
      - POSTGRES_PORT=5432
  watcher:
    environment:
      - POSTGRES_PORT=5432
