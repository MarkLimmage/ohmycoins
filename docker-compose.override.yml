services:
  proxy:
    ports:
      - "8010:80"
      - "8091:8080"
  db:
    ports:
      - "5433:5432"
  backend:
    volumes:
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
      - agent-artifacts:/data/agent_artifacts
    environment:
      - POSTGRES_PORT=5432
  orchestrator:
    volumes:
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
      - agent-artifacts:/data/agent_artifacts
    environment:
      - POSTGRES_PORT=5432
  celery_worker:
    environment:
      - POSTGRES_PORT=5432
  prestart:
    environment:
      - POSTGRES_PORT=5432
  supervisor-mock:
    image: ${DOCKER_IMAGE_BACKEND?Variable not set}:${TAG-latest}
    container_name: supervisor-mock
    working_dir: /app
    volumes:
      - ./scripts:/app/scripts:ro
    ports:
      - "8003:8001"
    command: python scripts/lab_supervisor.py
    environment:
      - PYTHONPATH=/app
    restart: unless-stopped
    networks:
      - default
