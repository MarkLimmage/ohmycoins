# Sprint 2.42 Track A — Port isolation + bind mounts for live edits
services:
  redis:
    ports:
      - "6380:6379"
  backend:
    volumes:
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
    environment:
      - POSTGRES_PORT=5432
  orchestrator:
    environment:
      - RUN_COLLECTORS=False
      - POSTGRES_PORT=5432
  prestart:
    environment:
      - POSTGRES_PORT=5432
  celery_worker:
    environment:
      - POSTGRES_PORT=5432
  watcher:
    environment:
      - POSTGRES_PORT=5432
