services:
  supervisor-mock:
    image: ohmycoins-backend:latest
    container_name: supervisor-mock
    working_dir: /app
    volumes:
      - ./scripts:/app/scripts:ro
    ports:
      - "8001:8001"
    command: python scripts/lab_supervisor.py
    environment:
      - PYTHONPATH=/app
    restart: unless-stopped
    networks:
      - supervisor-net

  supervisor-mlflow:
    image: python:3.10-slim
    container_name: supervisor-mlflow
    ports:
      - "5000:5000"
    command: /bin/bash -c "pip install mlflow && mlflow server --host 0.0.0.0 --port 5000"
    restart: unless-stopped
    networks:
      - supervisor-net

networks:
  supervisor-net:
    driver: bridge
